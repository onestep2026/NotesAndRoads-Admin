<section class="settings-card">
  <h2>API Settings</h2>
  <div class="settings-grid">
    <label>
      <span>Backend Base URL</span>
      <input [(ngModel)]="baseUrl" placeholder="http://106.15.42.189" />
    </label>
    <button type="button" (click)="save()">Save Base URL</button>
    @if (isLoggedIn) {
      <button type="button" class="secondary" (click)="logout()">Logout</button>
    }
  </div>

  @if (isLoggedIn) {
    <p class="message success">Status: Logged in</p>
  } @else {
    <p class="message">Status: Not logged in</p>
  }
</section>

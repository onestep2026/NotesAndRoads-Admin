<div class="settings-wrap">
  <button (click)="toggle()" class="settings-trigger" aria-label="Admin settings">
    <span class="status-dot" [class.offline]="!isLoggedIn"></span>
    <span class="trigger-main">
      <strong>{{ currentEmail }}</strong>
      <small>{{ currentEnvironment }}</small>
    </span>
  </button>

  @if (isOpen) {
    <div class="settings-panel">
      <label for="baseUrl">API Base URL</label>
      <input id="baseUrl" type="text" [(ngModel)]="baseUrl" class="admin-input" placeholder="http://localhost:9999" />

      <div class="settings-actions">
        <button (click)="save()" class="admin-button primary">Save</button>
        <button (click)="logout()" class="admin-button ghost-danger">Logout</button>
      </div>
    </div>
    <button class="settings-backdrop" (click)="toggle()" aria-label="Close settings"></button>
  }
</div>

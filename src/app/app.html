@if (isLoginRoute()) {
  <main class="login-shell">
    <router-outlet></router-outlet>
  </main>
} @else {
  <div class="app-shell-v2">
    <aside class="app-sidebar">
      <div class="sidebar-brand">
        <h1>知行 Admin</h1>
        <p>Moderation Console</p>
      </div>

      <nav class="sidebar-nav">
        @for (item of navItems(); track item.path) {
          <a [routerLink]="item.path" routerLinkActive="active">{{ item.label }}</a>
        }
      </nav>

      <p class="sidebar-footer">OneStep 2026</p>
    </aside>

    <main class="app-main-v2">
      <header class="app-topbar">
        <div>
          <h2>Admin Review Workspace</h2>
          <p>Fast, focused and auditable moderation workflow</p>
        </div>
        <app-admin-settings></app-admin-settings>
      </header>

      <section class="app-content-v2">
        <router-outlet></router-outlet>
      </section>
    </main>
  </div>
}

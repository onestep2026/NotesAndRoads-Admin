<div class="login-card-v2">
  <header>
    <h1>知行 Admin</h1>
    <p>Sign in to continue moderation work</p>
  </header>

  <div class="login-fields">
    <label>
      <span>Admin Email</span>
      <input type="email" [(ngModel)]="email" (keyup.enter)="login()" class="admin-input" placeholder="admin@onestep.com" />
    </label>

    <label>
      <span>Password</span>
      <input type="password" [(ngModel)]="password" (keyup.enter)="login()" class="admin-input" placeholder="••••••••" />
    </label>

    <label>
      <span>Gateway URL</span>
      <input type="text" [(ngModel)]="baseUrl" class="admin-input" placeholder="http://106.15.42.189" />
    </label>
  </div>

  @if (error) {
    <div class="admin-alert error">{{ error }}</div>
  }

  <button (click)="login()" [disabled]="loading" class="admin-button primary login-submit">
    {{ loading ? 'Signing in...' : 'Sign In' }}
  </button>
</div>
